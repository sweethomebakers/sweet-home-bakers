<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #fff0f5; }
    header { background: #ffc0cb; padding: 20px; text-align: center; }
    h1 { margin: 0; }
    .container { padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 10px; padding: 10px; text-align: center; }
    img { width: 100%; border-radius: 10px; }
    button { padding: 10px; margin-top: 5px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
    .upi { background: green; color: white; }
  </style>
</head>
<body>

<header>
  <h1>Sweet Home Bakers</h1>
  <p>Bangalore | Home Delivery / Pickup</p>
</header>

<div class="container">
  <h2>Menu</h2>
  <div class="grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec"><h3>Sourdough</h3><p>₹250</p><button>Add to Cart</button><button class="upi">Pay via UPI</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1589367920969-ab8e050bbb04"><h3>Brown Bread</h3><p>₹120</p><button>Add to Cart</button><button class="upi">Pay via UPI</button></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1599785209707-28d3a7f5f2a9"><h3>Birthday Cake</h3><p>₹600</p><button>Add to Cart</button><button class="upi">Pay via UPI</button></div>
  </div>

  <h2>Contact</h2>
  <p>WhatsApp: +91 99999 99999</p>
  <p>Instagram: @sweethomebakers</p>

  <h2>Offers</h2>
  <p>Use code SWEET10 for 10% off</p>

</div>

</body>
</html>
