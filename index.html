<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e8f5e9, #c8e6c9);
    }

    header {
      text-align:center;
      padding:30px;
    }

    h1 { font-size:40px; }

    .container { padding:20px; }

    .menu-card {
      background:white;
      border-radius:20px;
      padding:20px;
      max-width:700px;
      margin:20px auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
      transition:0.3s;
    }

    .menu-card:hover {
      transform:translateY(-8px);
    }

    .menu-item {
      display:flex;
      justify-content:space-between;
      padding:12px 0;
      border-bottom:1px dashed #ccc;
    }

    .menu-item:last-child { border:none; }

    img {
      width:100%;
      border-radius:12px;
      margin-top:10px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#43a047;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover {
      background:#2e7d32;
      transform:scale(1.05);
    }

    .cart {
      background:white;
      padding:20px;
      border-radius:15px;
      max-width:700px;
      margin:20px auto;
    }

    iframe { width:100%; height:200px; border-radius:10px; }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      cursor:pointer;
      font-size:22px;
    }

    .badge {
      color:red;
      font-size:12px;
    }
  </style>
</head>

<body>

<header>
  <h1>🍞 Sweet Home Bakers</h1>
  <p>Freshly baked happiness | Home Delivery</p>
</header>

<div class="container">

  <div class="menu-card">
    <h2>Menu</h2>

    <div id="menu"></div>
  </div>

  <div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <h4>Total: ₹<span id="total">0</span></h4>
    <button onclick="checkout()">Checkout via WhatsApp</button>
  </div>

  <h2 style="text-align:center;">📍 Location</h2>
  <iframe src="https://www.google.com/maps?q=Bangalore%20Bakery&output=embed"></iframe>

</div>

<div class="whatsapp" onclick="checkout()">💬</div>

<script>
const menuItems = [
  {name:"Bread", price:40},
  {name:"Sourdough", price:120},
  {name:"Brown Bread", price:60},
  {name:"Multigrain Bread", price:80},
  {name:"Birthday Cake", price:900},
  {name:"Cup Cakes", price:100},
  {name:"Sugar Free Cake", price:1000},
  {name:"Cheese Cake", price:750, badge:"🔥 Best Seller"},
  {name:"Croissant", price:120}
];

let cart = [];

function renderMenu(){
  const menuDiv = document.getElementById('menu');
  menuItems.forEach(item=>{
    menuDiv.innerHTML += `
      <div class="menu-item">
        <span>${item.name} ${item.badge ? `<span class='badge'>${item.badge}</span>`:''}</span>
        <span>₹${item.price}</span>
      </div>
      <button onclick="addToCart('${item.name}', ${item.price})">Add ${item.name}</button>
    `;
  });
}

function addToCart(name, price){
  const existing = cart.find(item => item.name === name);
  if(existing){
    existing.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

function updateCart(){
  let cartDiv = document.getElementById('cartItems');
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item=>{
    cartDiv.innerHTML += `<p>${item.name} x${item.qty} - ₹${item.price * item.qty}</p>`;
    total += item.price * item.qty;
  });

  document.getElementById('total').innerText = total;
}

function checkout(){
  let message = "Order Details:%0A";
  let total = 0;

  cart.forEach(item=>{
    message += `${item.name} x${item.qty} = ₹${item.price * item.qty}%0A`;
    total += item.price * item.qty;
  });

  message += `Total: ₹${total}`;

  window.open(`https://wa.me/918888888888?text=${message}`, '_blank');
}

renderMenu();
</script>

</body>
</html>
