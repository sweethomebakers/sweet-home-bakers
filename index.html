<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Poppins', sans-serif; background:#e8f5e9; }
    header { text-align:center; padding:20px; background:#a5d6a7; }
    header h1 { font-family:'Playfair Display', serif; font-size:36px; }

    .top-bar { display:flex; justify-content:space-between; padding:10px 20px; gap:10px; }
    .search-box { flex:1; padding:12px; border-radius:25px; border:none; outline:none; }
    .login-btn { padding:10px 15px; border:none; border-radius:20px; background:#66bb6a; color:white; cursor:pointer; }

    .menu { padding:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }

    .card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
    .card img { width:100%; height:150px; object-fit:cover; }
    .card-body { padding:15px; }
    .title { font-weight:600; }
    .price { color:#388e3c; font-weight:600; }

    .qty-control { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .qty-btn { background:#66bb6a; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; }

    .floating-cart { position:fixed; bottom:20px; right:20px; background:#388e3c; color:white; padding:15px 20px; border-radius:30px; cursor:pointer; }

    .cart-popup { position:fixed; bottom:80px; right:20px; width:300px; background:white; border-radius:15px; padding:15px; display:none; box-shadow:0 10px 25px rgba(0,0,0,0.2); }

    .fly-img { position:fixed; width:50px; height:50px; border-radius:50%; pointer-events:none; z-index:9999; transition:all 0.8s ease-in-out; }

    .banner { background:#66bb6a; color:white; text-align:center; padding:10px; font-weight:600; }

    footer { text-align:center; padding:20px; background:#c8e6c9; }
  </style>
</head>

<body>

<div class="banner">
  🎉 Use SWEET10 (10% OFF) | BAKE20 (20% OFF above ₹999) | ⏳ Ends in <span id="timer">05:00</span>
</div>

<header>
  <h1>🍰 Sweet Home Bakers</h1>
  <p>Delicious Scrumptious • Mumbai</p>
  <p style="color:#2e7d32;font-weight:600;">🚚 Home Delivery Available</p>
</header>

<div class="top-bar">
  <input type="text" class="search-box" placeholder="Search..." onkeyup="searchItems(this.value)">
  <button class="login-btn" onclick="login()">Login</button>
</div>

<div class="menu" id="menu"></div>

<div class="floating-cart" id="cartIcon" onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</div>

<div class="cart-popup" id="cartPopup">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
  <button onclick="goToCheckout()">Checkout</button>
</div>

<!-- Reviews -->
<div style="padding:30px;text-align:center;">
  <h2>⭐ Customer Reviews</h2>
  <div id="reviewBox" style="margin-top:20px;font-size:18px;">Amazing cakes! 😍</div>
</div>

<footer>
  <p>📞 +91 99999 99999</p>

  <div class="social-icons">
    <a href="https://www.instagram.com/sweethomebakerss?igsh=MTQ1cWtuaHM1OGd2NA%3D%3D&utm_source=qr" target="_blank" title="Instagram"></a>
    <a href="https://pin.it/4wH8I3EUn" target="_blank" title="Pinterest"></a>
    <a href="https://snapchat.com/t/cLMzc302" target="_blank" title="Snapchat"></a>
    <a href="https://www.facebook.com/share/17yJ57Vx9m/?mibextid=wwXIfr" target="_blank" title="Facebook"></a>
  </div>

  <p style="font-size:12px; margin-top:10px; color:#555;">
    Follow us on Instagram: @sweethomebakerss
  </p>
</footer>

<style>
.social-icons {
  margin-top:10px;
}
.social-icons a {
  display:inline-block;
  margin:8px;
  width:40px;
  height:40px;
  background:white;
  border-radius:50%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

.social-icons a:hover {
  transform:scale(1.2);
  background:#66bb6a;
}

.social-icons svg {
  width:20px;
  height:20px;
  fill:#388e3c;
}

.social-icons a:hover svg {
  fill:white;
}
</style>

<script>
const menuItems = [
  {name:"Bread", price:40, img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"},
  {name:"Brown Bread", price:60, img:"https://images.unsplash.com/photo-1509440159596-0249088772ff"},
  {name:"Multigrain Bread", price:80, img:"https://images.unsplash.com/photo-1512058564366-c9e3e046c79a"},
  {name:"Birthday Cake", price:900, img:"https://images.unsplash.com/photo-1599785209707-28e1e3b6f7a9"},
  {name:"Cup Cakes", price:100, img:"https://images.unsplash.com/photo-1589308078054-832f0ef2c66f"},
  {name:"Cheese Cake", price:750, img:"https://images.unsplash.com/photo-1565958011703-44f9829ba187"},
  {name:"Puff", price:50, img:"https://images.unsplash.com/photo-1604908176997-4311cbb91f9b"},
  {name:"Cutlet", price:70, img:"https://images.unsplash.com/photo-1604908554168-9f3c0c0b0e2a"},
  {name:"Ragi Cake", price:120, img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587"}
];

let cart = [];

function renderMenu(list){
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = "";

  list.forEach(item=>{
    const cartItem = cart.find(c=>c.name===item.name);
    const qty = cartItem ? cartItem.qty : 0;

    menuDiv.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <div class="card-body">
          <div class="title">${item.name}</div>
          <div class="price">₹${item.price}</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item.name}', ${item.price}, -1, this)">-</button>
            <span>${qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.name}', ${item.price}, 1, this)">+</button>
          </div>
        </div>
      </div>
    `;
  });
}

function changeQty(name, price, delta, btn){
  let item = cart.find(i=>i.name===name);

  if(!item && delta>0){ cart.push({name, price, qty:1}); }
  else if(item){ item.qty += delta; if(item.qty<=0){ cart = cart.filter(i=>i.name!==name); } }

  if(delta>0){
    const product = menuItems.find(i=>i.name===name);
    animateToCart(product.img, btn);
  }

  updateCart();
  renderMenu(menuItems);
}

function animateToCart(imgSrc, btn){
  const img = document.createElement('img');
  img.src = imgSrc;
  img.className = 'fly-img';

  const rect = btn.getBoundingClientRect();
  img.style.left = rect.left + 'px';
  img.style.top = rect.top + 'px';

  document.body.appendChild(img);

  const cartRect = document.getElementById('cartIcon').getBoundingClientRect();

  setTimeout(()=>{
    img.style.left = cartRect.left + 'px';
    img.style.top = cartRect.top + 'px';
    img.style.opacity = 0;
  },10);

  setTimeout(()=> img.remove(), 800);
}

function updateCart(){
  let cartDiv = document.getElementById('cartItems');
  let total = 0, count = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item=>{
    cartDiv.innerHTML += `<p>${item.name} x${item.qty} - ₹${item.price * item.qty}</p>`;
    total += item.price * item.qty;
    count += item.qty;
  });

  document.getElementById('total').innerText = total;
  document.getElementById('count').innerText = count;
}

function toggleCart(){
  const popup = document.getElementById('cartPopup');
  popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
}

function goToCheckout(){
  localStorage.setItem('cart', JSON.stringify(cart));
  window.location.href = 'checkout.html';
}

function login(){
  let name = prompt("Enter your name:");
  if(name) alert("Welcome " + name);
}

// FIXED REVIEW SLIDER + TIMER
window.addEventListener('DOMContentLoaded', ()=>{
  renderMenu(menuItems);

  const reviews = [
    "Amazing cakes! 😍",
    "Best bakery in Mumbai!",
    "Loved the cupcakes 🎂",
    "Affordable & tasty ⭐"
  ];

  let index = 0;
  setInterval(()=>{
    index = (index + 1) % reviews.length;
    document.getElementById('reviewBox').innerText = reviews[index];
  },3000);

  let time = 300;
  setInterval(()=>{
    if(time >= 0){
      let m = Math.floor(time/60);
      let s = time % 60;
      document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
      time--;
    }
  },1000);
});
</script>

</body>
</html>
