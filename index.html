<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: 'Georgia', serif; background: linear-gradient(to right, #dcedc8, #c5e1a5); color:#2e7d32; }
    header { text-align:center; padding:30px; }
    h1 { font-size:42px; letter-spacing:1px; }
    .container { padding:20px; }

    /* Menu card style */
    .menu-card {
      background:#ffffff;
      border-radius:15px;
      padding:20px;
      max-width:600px;
      margin:20px auto;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .menu-item {
      display:flex;
      justify-content:space-between;
      border-bottom:1px dashed #ccc;
      padding:10px 0;
      font-size:18px;
    }

    .menu-item:last-child { border-bottom:none; }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#8bc34a;
      color:white;
      cursor:pointer;
    }

    .popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; }
    .popup-box { background:white; padding:20px; border-radius:15px; text-align:center; }

    .cart { background:white; padding:15px; border-radius:10px; margin:20px auto; max-width:600px; }

    iframe { border-radius:10px; height:200px; width:100%; }

    .whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50%; font-size:20px; cursor:pointer; }

    .live { position:fixed; bottom:10px; left:10px; background:black; color:white; padding:10px; border-radius:10px; }
  </style>
</head>

<body>

<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Welcome to Sweet Home Bakers 🎂</h2>
    <p>Delicious Devouring bakery experience</p>
    <button onclick="closePopup()">Start Ordering</button>
  </div>
</div>

<header>
  <h1>Sweet Home Bakers</h1>
  <p>Bangalore | Home Delivery / Pickup</p>
</header>

<div class="container">

  <div class="menu-card">
    <h2 style="text-align:center;">🍰 Bakery Menu</h2>

    <div class="menu-item">
      <span>Cheesecake</span>
      <span>₹750</span>
    </div>

    <div class="menu-item">
      <span>Puff</span>
      <span>₹50</span>
    </div>

    <div class="menu-item">
      <span>Cupcake</span>
      <span>₹80</span>
    </div>

    <button onclick="addToCart('Cheesecake',750)">Add Cheesecake</button>
    <button onclick="addToCart('Puff',50)">Add Puff</button>
    <button onclick="addToCart('Cupcake',80)">Add Cupcake</button>
  </div>

  <div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="checkout()">Checkout</button>
  </div>

  <h2 style="text-align:center;">📍 Location</h2>
  <iframe src="https://www.google.com/maps?q=Bangalore&output=embed"></iframe>

  <h2 style="text-align:center;">📞 Contact</h2>
  <p style="text-align:center;">WhatsApp: +91 88888 88888</p>
  <p style="text-align:center;">Instagram: @sweethomebakerss</p>

</div>

<div id="live" class="live"></div>
<div class="whatsapp" onclick="openWhatsApp()">💬</div>

<script>
let cart=[];

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

function updateCart(){
  let cartDiv=document.getElementById('cartItems');
  let total=0;
  cartDiv.innerHTML="";
  cart.forEach(item=>{
    cartDiv.innerHTML+=`<p>${item.name} - ₹${item.price}</p>`;
    total+=item.price;
  });
  document.getElementById('total').innerText=total;
}

function checkout(){ alert("Order placed! We will contact you."); }

function openWhatsApp(){
  window.open("https://wa.me/918888888888?text=I want to order from Sweet Home Bakers","_blank");
}

function closePopup(){ document.getElementById('popup').style.display='none'; }

setInterval(()=>{
  const items=["Cheesecake","Puff","Cupcake"];
  const random=items[Math.floor(Math.random()*items.length)];
  document.getElementById('live').innerText="Someone ordered "+random+" 🍰";
},3000);
</script>

</body>
</html>
