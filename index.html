<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background: linear-gradient(to right, #000000, #1a1a1a); color:#f5d76e; }
    header { text-align:center; padding:30px; }
    h1 { font-size:42px; letter-spacing:2px; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
    .card { background:#111; border-radius:15px; padding:10px; text-align:center; box-shadow:0 4px 15px rgba(255,215,0,0.2); }
    img { width:100%; height:150px; object-fit:cover; border-radius:10px; }
    button { width:100%; padding:10px; margin-top:5px; border:none; border-radius:8px; cursor:pointer; }
    .upi { background:#f5d76e; color:black; font-weight:bold; }
    .gold { color:#f5d76e; }
    .popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; }
    .popup-box { background:#111; padding:20px; border-radius:15px; text-align:center; color:#f5d76e; }
    .live { position:fixed; bottom:10px; left:10px; background:black; color:#f5d76e; padding:10px; border-radius:10px; }
    iframe { border-radius:10px; height:200px; }

    /* WhatsApp floating */
    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    /* Cart */
    .cart { background:#111; padding:15px; border-radius:10px; margin-top:20px; }
  </style>
</head>

<body>

<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Welcome to Sweet Home Bakers 🎂</h2>
    <p>Luxury cakes & bakery experience</p>
    <button onclick="closePopup()">Start Ordering</button>
  </div>
</div>

<header>
  <h1 class="gold">Sweet Home Bakers</h1>
  <p>Bangalore | Premium Home Delivery</p>
  <p style="color:red;">🔥 Limited luxury items available</p>
</header>

<div class="container">
  <h2 class="gold">Our Premium Menu</h2>
  <div class="grid" id="menu"></div>

  <div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <p>Total: ₹<span id="total">0</span></p>
    <button class="upi" onclick="checkout()">Checkout</button>
  </div>

  <h2>📍 Location</h2>
  <iframe src="https://www.google.com/maps?q=Bangalore&output=embed" width="100%"></iframe>
</div>

<div id="live" class="live"></div>

<div class="whatsapp" onclick="openWhatsApp()">💬</div>

<script>
const items = [
  {name:"Cheesecake", price:750, img:"https://images.unsplash.com/photo-1605478906955-69c9c6fbd0c3"},
  {name:"Puff", price:50, img:"https://images.unsplash.com/photo-1604908176997-43198f4aa6b6"},
  {name:"Cupcake", price:80, img:"https://images.unsplash.com/photo-1589307004396-7c1d6b5c9b41"}
];

let cart = [];

function loadMenu(){
  const menu = document.getElementById("menu");
  items.forEach(item=>{
    menu.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick='addToCart(${JSON.stringify(item)})'>Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(item){
  cart.push(item);
  updateCart();
}

function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");
  cartDiv.innerHTML="";
  let total=0;
  cart.forEach(i=>{
    cartDiv.innerHTML += `<p>${i.name} - ₹${i.price}</p>`;
    total+=i.price;
  });
  totalEl.innerText=total;
}

function checkout(){
  alert("Order placed! We will contact you on WhatsApp.");
}

function openWhatsApp(){
  window.open("https://wa.me/919999999999?text=I want to order from Sweet Home Bakers","_blank");
}

function closePopup(){ document.getElementById('popup').style.display='none'; }

setInterval(()=>{
  const random = items[Math.floor(Math.random()*items.length)].name;
  document.getElementById('live').innerText = "Someone ordered " + random + " 🍰";
},3000);

loadMenu();
</script>

</body>
</html>
