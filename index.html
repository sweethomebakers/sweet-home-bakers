<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Poppins', sans-serif; background: linear-gradient(135deg, #fff8f0, #ffe0b2); }

    header { text-align:center; padding:20px; }

    .top-bar { display:flex; justify-content:space-between; padding:10px 20px; gap:10px; }

    .search-box { flex:1; padding:12px; border-radius:25px; border:none; outline:none; box-shadow:0 2px 8px rgba(0,0,0,0.1); }

    .login-btn { padding:10px 15px; border:none; border-radius:20px; background:#ff7043; color:white; cursor:pointer; }

    .menu { padding:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }

    .card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.1); transition:0.3s; }

    .card:hover { transform:translateY(-8px) scale(1.02); }

    .card img { width:100%; height:150px; object-fit:cover; }

    .card-body { padding:15px; }

    .title { font-weight:600; }

    .price { color:#ff7043; font-weight:600; }

    button { width:100%; margin-top:10px; padding:10px; border:none; border-radius:10px; background:#ff7043; color:white; cursor:pointer; }

    .floating-cart {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#ff7043;
      color:white;
      padding:15px 20px;
      border-radius:30px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      cursor:pointer;
    }

    .cart-popup {
      position:fixed;
      bottom:80px;
      right:20px;
      width:300px;
      background:white;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      padding:15px;
      display:none;
    }

    .cart-item { display:flex; justify-content:space-between; margin-bottom:8px; }

    footer {
      text-align:center;
      padding:20px;
      background:#fff3e0;
      margin-top:20px;
    }

  </style>
</head>

<body>

<header>
  <h1>🍰 Sweet Home Bakers</h1>
  <p>Fresh • Aesthetic • Delicious</p>
</header>

<div class="top-bar">
  <input type="text" class="search-box" placeholder="Search cakes, breads..." onkeyup="searchItems(this.value)">
  <button class="login-btn" onclick="login()">Login</button>
</div>

<div class="menu" id="menu"></div>

<!-- Floating Cart -->
<div class="floating-cart" onclick="toggleCart()">🛒 View Cart (<span id="count">0</span>)</div>

<div class="cart-popup" id="cartPopup">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
  <button onclick="goToCheckout()">Proceed</button>
</div>

<footer>
  <p>📞 +91 99999 99999</p>
  <p>📸 Instagram: @sweethomebakers</p>
</footer>

<script>
const menuItems = [
  {name:"Bread", price:40, img:"https://source.unsplash.com/300x200/?bread"},
  {name:"Sourdough", price:120, img:"https://source.unsplash.com/300x200/?sourdough"},
  {name:"Brown Bread", price:60, img:"https://source.unsplash.com/300x200/?brown-bread"},
  {name:"Multigrain Bread", price:80, img:"https://source.unsplash.com/300x200/?multigrain"},
  {name:"Birthday Cake", price:900, img:"https://source.unsplash.com/300x200/?cake"},
  {name:"Cup Cakes", price:100, img:"https://source.unsplash.com/300x200/?cupcake"},
  {name:"Sugar Free Cake", price:1000, img:"https://source.unsplash.com/300x200/?dessert"},
  {name:"Cheese Cake", price:750, img:"https://source.unsplash.com/300x200/?cheesecake"},
  {name:"Croissant", price:120, img:"https://source.unsplash.com/300x200/?croissant"}
];

let cart = [];

function renderMenu(list){
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = "";

  list.forEach(item=>{
    menuDiv.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <div class="card-body">
          <div class="title">${item.name}</div>
          <div class="price">₹${item.price}</div>
          <button onclick="addToCart('${item.name}', ${item.price})">Add</button>
        </div>
      </div>
    `;
  });
}

function searchItems(query){
  const filtered = menuItems.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));
  renderMenu(filtered);
}

function addToCart(name, price){
  const existing = cart.find(item => item.name === name);
  if(existing){ existing.qty++; }
  else { cart.push({name, price, qty:1}); }
  updateCart();
}

function updateCart(){
  let cartDiv = document.getElementById('cartItems');
  let total = 0;
  let count = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item=>{
    cartDiv.innerHTML += `<div class='cart-item'><span>${item.name} x${item.qty}</span><span>₹${item.price * item.qty}</span></div>`;
    total += item.price * item.qty;
    count += item.qty;
  });

  document.getElementById('total').innerText = total;
  document.getElementById('count').innerText = count;
}

function toggleCart(){
  const popup = document.getElementById('cartPopup');
  popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
}

function goToCheckout(){
  alert("Redirecting to payment page...");
}

function login(){
  let name = prompt("Enter your name:");
  if(name) alert("Welcome " + name + " 👋");
}

renderMenu(menuItems);
</script>

</body>
</html>
