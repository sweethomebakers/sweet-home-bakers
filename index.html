<!DOCTYPE html>
<html>
<head>
  <title>Sweet Home Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:'Poppins', sans-serif; background:#f1f8e9; }
    header { text-align:center; padding:20px; }

    .top-bar { display:flex; justify-content:space-between; padding:10px 20px; }

    .search-box {
      width:60%; padding:10px; border-radius:20px; border:1px solid #ccc;
    }

    .login-btn {
      padding:10px 15px; background:#43a047; color:white; border:none; border-radius:10px; cursor:pointer;
    }

    .container { display:flex; }

    .menu {
      width:65%; padding:20px;
    }

    .menu-card {
      background:white; border-radius:15px; padding:15px; margin-bottom:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1); transition:0.3s;
    }

    .menu-card:hover { transform:scale(1.02); }

    .menu-item { display:flex; justify-content:space-between; }

    img { width:100%; border-radius:10px; margin:10px 0; }

    button {
      width:100%; padding:10px; border:none; border-radius:10px;
      background:#43a047; color:white; cursor:pointer; transition:0.3s;
    }

    button:hover { transform:scale(1.05); }

    .cart {
      width:35%; position:fixed; right:0; top:0; height:100%;
      background:white; padding:20px; box-shadow:-5px 0 15px rgba(0,0,0,0.2);
      overflow:auto;
    }

    .badge { color:red; font-size:12px; }

  </style>
</head>

<body>

<header>
  <h1>🍞 Sweet Home Bakers</h1>
</header>

<div class="top-bar">
  <input type="text" class="search-box" placeholder="Search food..." onkeyup="searchItems(this.value)">
  <button class="login-btn" onclick="login()">Login</button>
</div>

<div class="container">

  <div class="menu" id="menu"></div>

  <div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems"></div>
    <h4>Total: ₹<span id="total">0</span></h4>
    <button onclick="checkout()">Checkout</button>
  </div>

</div>

<script>
const menuItems = [
  {name:"Bread", price:40, img:"https://source.unsplash.com/400x300/?bread"},
  {name:"Sourdough", price:120, img:"https://source.unsplash.com/400x300/?sourdough"},
  {name:"Brown Bread", price:60, img:"https://source.unsplash.com/400x300/?brown-bread"},
  {name:"Multigrain Bread", price:80, img:"https://source.unsplash.com/400x300/?multigrain-bread"},
  {name:"Birthday Cake", price:900, img:"https://source.unsplash.com/400x300/?birthday-cake"},
  {name:"Cup Cakes", price:100, img:"https://source.unsplash.com/400x300/?cupcake"},
  {name:"Sugar Free Cake", price:1000, img:"https://source.unsplash.com/400x300/?cake"},
  {name:"Cheese Cake", price:750, img:"https://source.unsplash.com/400x300/?cheesecake", badge:"🔥 Best Seller"},
  {name:"Croissant", price:120, img:"https://source.unsplash.com/400x300/?croissant"}
];

let cart = [];

function renderMenu(list){
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = "";

  list.forEach(item=>{
    menuDiv.innerHTML += `
      <div class="menu-card">
        <div class="menu-item">
          <span>${item.name} ${item.badge ? `<span class='badge'>${item.badge}</span>`:''}</span>
          <span>₹${item.price}</span>
        </div>
        <img src="${item.img}">
        <button onclick="addToCart('${item.name}', ${item.price})">Add to Cart</button>
      </div>
    `;
  });
}

function searchItems(query){
  const filtered = menuItems.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));
  renderMenu(filtered);
}

function addToCart(name, price){
  const existing = cart.find(item => item.name === name);
  if(existing){ existing.qty++; }
  else { cart.push({name, price, qty:1}); }
  updateCart();
}

function updateCart(){
  let cartDiv = document.getElementById('cartItems');
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item=>{
    cartDiv.innerHTML += `<p>${item.name} x${item.qty} - ₹${item.price * item.qty}</p>`;
    total += item.price * item.qty;
  });

  document.getElementById('total').innerText = total;
}

function checkout(){
  let message = "Order Details:%0A";
  let total = 0;

  cart.forEach(item=>{
    message += `${item.name} x${item.qty} = ₹${item.price * item.qty}%0A`;
    total += item.price * item.qty;
  });

  message += `Total: ₹${total}`;

  window.open(`https://wa.me/918888888888?text=${message}`, '_blank');
}

function login(){
  let name = prompt("Enter your name:");
  if(name) alert("Welcome " + name + "!");
}

renderMenu(menuItems);
</script>

</body>
</html>
